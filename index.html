<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гідравліка 6.0: Формули та Гравітація</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .lab-container { display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 95%; max-width: 900px; }
        @media (min-width: 768px) { .lab-container { flex-direction: row; } }
        
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        canvas { background: #fff; border: 2px solid #34495e; border-radius: 8px; width: 100%; height: auto; touch-action: none; }
        
        .param-box { background: #f8f9fa; padding: 8px; border-radius: 8px; border-left: 4px solid #3498db; }
        .formula-box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; width: 95%; max-width: 900px; margin-top: 15px; line-height: 1.5; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        .highlight { color: #2ecc71; font-weight: bold; }
        label { font-size: 12px; font-weight: bold; color: #34495e; display: block; }
        input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0;">Гідравлічний Стенд: Фізичні розрахунки</h2>

    <div class="lab-container">
        <div class="sidebar">
            <div class="param-box">
                <label>Гравітація (g): <span id="g_l">9.81</span> м/с²</label>
                <input type="range" id="g_r" min="0" max="25" step="0.1" value="9.81">
            </div>
            <div class="param-box">
                <label>Густина (ρ): <span id="rho_l">1000</span> кг/м³</label>
                <input type="range" id="rho_r" min="500" max="2000" step="50" value="1000">
            </div>
            <div class="param-box">
                <label>S1: <span id="s1_l">30</span> | S2: <span id="s2_l">100</span> (см²)</label>
                <input type="range" id="s1_r" min="15" max="60" value="30">
                <input type="range" id="s2_r" min="70" max="180" value="100">
            </div>
            <button onclick="h1=180; h2=180; totalVol = h1*S1 + h2*S2;" style="padding:10px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">Reset (Долити воду)</button>
        </div>

        <canvas id="mainCanvas" width="600" height="400"></canvas>
    </div>

    <div class="formula-box" id="formula_display">
        </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    let g = 9.81, rho = 1000, S1 = 30, S2 = 100, h1 = 180, h2 = 180;
    const baseY = 360;
    let totalVol = h1 * S1 + h2 * S2;

    let items = [
        { x: 20, y: 20, w: 35, h: 35, m: 5, color: '#f1c40f', label: '5кг', p: null, drag: false },
        { x: 65, y: 20, w: 45, h: 45, m: 20, color: '#e67e22', label: '20кг', p: null, drag: false },
        { x: 120, y: 20, w: 55, h: 55, m: 50, color: '#c0392b', label: '50кг', p: null, drag: false }
    ];

    let dragObj = null;
    let offset = { x: 0, y: 0 };

    // Оновлення параметрів
    function sync() {
        g = parseFloat(document.getElementById('g_r').value);
        rho = parseInt(document.getElementById('rho_r').value);
        S1 = parseInt(document.getElementById('s1_r').value);
        S2 = parseInt(document.getElementById('s2_r').value);
        document.getElementById('g_l').innerText = g.toFixed(2);
        document.getElementById('rho_l').innerText = rho;
        document.getElementById('s1_l').innerText = S1;
        document.getElementById('s2_l').innerText = S2;
        totalVol = h1 * S1 + h2 * S2;
    }

    document.querySelectorAll('input[type="range"]').forEach(i => i.oninput = sync);

    function getCoords(e) {
        const r = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
    }

    canvas.addEventListener('mousedown', e => {
        const {x, y} = getCoords(e);
        items.forEach(o => { if (x > o.x && x < o.x + o.w && y > o.y && y < o.y + o.h) { dragObj = o; o.drag = true; o.p = null; offset = {x: x-o.x, y: y-o.y}; } });
    });
    window.addEventListener('mousemove', e => { if(dragObj) { const {x, y} = getCoords(e); dragObj.x = x-offset.x; dragObj.y = y-offset.y; } });
    window.addEventListener('mouseup', () => { if(dragObj) { if(Math.abs(dragObj.x+dragObj.w/2 - 180) < S1) dragObj.p = 1; else if(Math.abs(dragObj.x+dragObj.w/2 - 450) < S2) dragObj.p = 2; dragObj.drag = false; dragObj = null; } });
    
    // Touch support
    canvas.addEventListener('touchstart', e => { if(e.cancelable) e.preventDefault(); const {x, y} = getCoords(e); items.forEach(o => { if (x > o.x && x < o.x + o.w && y > o.y && y < o.y + o.h) { dragObj = o; o.drag = true; o.p = null; offset = {x: x-o.x, y: y-o.y}; } }); }, {passive: false});
    window.addEventListener('touchmove', e => { if(dragObj) { if(e.cancelable) e.preventDefault(); const {x, y} = getCoords(e); dragObj.x = x-offset.x; dragObj.y = y-offset.y; } }, {passive: false});
    window.addEventListener('touchend', () => { if(dragObj) { if(Math.abs(dragObj.x+dragObj.w/2 - 180) < S1) dragObj.p = 1; else if(Math.abs(dragObj.x+dragObj.w/2 - 450) < S2) dragObj.p = 2; dragObj.drag = false; dragObj = null; } });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Вода
        ctx.fillStyle = '#3498db'; ctx.globalAlpha = 0.7;
        ctx.fillRect(180 - S1/2, baseY - h1 - 40, S1, h1 + 40);
        ctx.fillRect(450 - S2/2, baseY - h2 - 40, S2, h2 + 40);
        ctx.fillRect(180 - S1/2, baseY - 40, 270 + S2/2, 40);
        ctx.globalAlpha = 1.0;

        // Труби
        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 4;
        ctx.strokeRect(180 - S1/2, 50, S1, baseY - 50);
        ctx.strokeRect(450 - S2/2, 50, S2, baseY - 50);

        const p1Y = baseY - h1 - 50; const p2Y = baseY - h2 - 50;
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(180 - S1/2 - 2, p1Y, S1 + 4, 15);
        ctx.fillRect(450 - S2/2 - 2, p2Y, S2 + 4, 15);

        let m1 = 0, m2 = 0;
        items.forEach(o => {
            if (o.p === 1) m1 += o.m; if (o.p === 2) m2 += o.m;
            ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.fillStyle = 'white'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
            ctx.fillText(o.label, o.x + o.w/2, o.y + o.h/2 + 5);
        });

        // ФІЗИЧНІ РОЗРАХУНКИ
        const S1_m = S1 * 0.0001, S2_m = S2 * 0.0001;
        const h1_m = h1 * 0.01, h2_m = h2 * 0.01;

        const P1_p = (m1 * g) / S1_m;
        const P1_h = rho * g * h1_m;
        const P1_tot = P1_p + P1_h;

        const P2_p = (m2 * g) / S2_m;
        const P2_h = rho * g * h2_m;
        const P2_tot = P2_p + P2_h;

        const ratio = P1_tot / P2_tot;

        // Вивід формул
        document.getElementById('formula_display').innerHTML = `
            <div><b>Лівий бік:</b> P1 = (${m1}кг · ${g} / ${S1_m}м²) + (${rho} · ${g} · ${h1_m.toFixed(2)}м) = <span class="highlight">${Math.round(P1_tot)} Па</span></div>
            <div><b>Правий бік:</b> P2 = (${m2}кг · ${g} / ${S2_m}м²) + (${rho} · ${g} · ${h2_m.toFixed(2)}м) = <span class="highlight">${Math.round(P2_tot)} Па</span></div>
            <div style="margin-top:10px; border-top: 1px solid #444; padding-top: 5px;">
                ВІДНОШЕННЯ ТИСКІВ (P1/P2): <span class="highlight" style="color:${Math.abs(1-ratio) < 0.01 ? '#2ecc71' : '#e74c3c'}">${ratio.toFixed(3)}</span> 
                ${Math.abs(1-ratio) < 0.01 ? ' (РІВНОВАГА)' : ''}
            </div>
        `;

        // Рух
        if (P1_tot > P2_tot + 5 && h1 > 20) { h1 -= 1; h2 = (totalVol - h1 * S1) / S2; }
        else if (P2_tot > P1_tot + 5 && h2 > 20) { h2 -= 1; h1 = (totalVol - h2 * S2) / S1; }

        items.forEach(o => {
            if (!o.drag) {
                if (o.p === 1) { o.x = 180 - o.w/2; o.y = p1Y - o.h; }
                if (o.p === 2) { o.x = 450 - o.w/2; o.y = p2Y - o.h; }
            }
        });

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
