<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мобільна Гідростатика 5.1</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #f0f4f8; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; margin: 0; touch-action: manipulation;
        }
        .lab-container { 
            display: flex; flex-direction: column; gap: 15px; background: white; 
            padding: 15px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            width: 95%; max-width: 800px;
        }
        @media (min-width: 768px) { .lab-container { flex-direction: row; } }

        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        canvas { 
            background: #fff; border: 2px solid #34495e; border-radius: 8px; 
            width: 100%; height: auto; touch-action: none; /* Важливо для мобілок */
        }
        .param-box { background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid #3498db; }
        .data-screen { background: #2c3e50; color: #2ecc71; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
        input[type="range"] { width: 100%; height: 25px; }
        button { padding: 12px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="font-size: 1.2em; margin: 10px 0;">Гідростатика (Mobile Ready)</h2>

    <div class="lab-container">
        <div class="sidebar">
            <div class="param-box">
                <label style="font-size: 12px;">Густина (ρ): <span id="rho_l">1000</span></label>
                <input type="range" id="rho_r" min="500" max="2000" value="1000">
            </div>
            <div class="param-box">
                <label style="font-size: 12px;">S1: <span id="s1_l">30</span> | S2: <span id="s2_l">100</span></label>
                <input type="range" id="s1_r" min="15" max="60" value="30">
                <input type="range" id="s2_r" min="70" max="150" value="100">
            </div>
            <div class="data-screen" id="stats">
                P1: 0 Па | P2: 0 Па
            </div>
            <button onclick="resetSystem()">Reset</button>
        </div>

        <canvas id="hydroCanvas" width="600" height="450"></canvas>
    </div>

<script>
    const canvas = document.getElementById('hydroCanvas');
    const ctx = canvas.getContext('2d');

    let rho = 1000, S1 = 30, S2 = 100, h1 = 180, h2 = 180, g = 9.81;
    const baseY = 400;
    let totalVol = h1 * S1 + h2 * S2;

    let items = [
        { x: 20, y: 20, w: 40, h: 40, m: 10, color: '#f1c40f', label: '10кг', p: null, drag: false },
        { x: 80, y: 20, w: 50, h: 50, m: 30, color: '#e67e22', label: '30кг', p: null, drag: false },
        { x: 150, y: 20, w: 60, h: 60, m: 80, color: '#c0392b', label: '80кг', p: null, drag: false }
    ];

    let dragObj = null;
    let offset = { x: 0, y: 0 };

    function resetSystem() { h1 = 180; h2 = 180; totalVol = h1 * S1 + h2 * S2; }

    // Взаємодія (Миша + Тач)
    function getCoords(e) {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        // Масштабування координат для Canvas
        return {
            x: (clientX - r.left) * (canvas.width / r.width),
            y: (clientY - r.top) * (canvas.height / r.height)
        };
    }

    function startDrag(e) {
        const {x, y} = getCoords(e);
        items.forEach(o => {
            if (x > o.x && x < o.x + o.w && y > o.y && y < o.y + o.h) {
                dragObj = o; o.drag = true; o.p = null;
                offset.x = x - o.x; offset.y = y - o.y;
                if(e.cancelable) e.preventDefault();
            }
        });
    }

    function doDrag(e) {
        if (!dragObj) return;
        const {x, y} = getCoords(e);
        dragObj.x = x - offset.x;
        dragObj.y = y - offset.y;
        if(e.cancelable) e.preventDefault();
    }

    function stopDrag() {
        if (dragObj) {
            if (Math.abs(dragObj.x + dragObj.w/2 - 180) < S1) dragObj.p = 1;
            else if (Math.abs(dragObj.x + dragObj.w/2 - 450) < S2) dragObj.p = 2;
            dragObj.drag = false; dragObj = null;
        }
    }

    canvas.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', stopDrag);

    canvas.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('touchmove', doDrag, {passive: false});
    window.addEventListener('touchend', stopDrag);

    // Логіка оновлення слайдерів
    const inputs = ['rho_r', 's1_r', 's2_r'];
    inputs.forEach(id => document.getElementById(id).oninput = () => {
        rho = +document.getElementById('rho_r').value;
        S1 = +document.getElementById('s1_r').value;
        S2 = +document.getElementById('s2_r').value;
        document.getElementById('rho_l').innerText = rho;
        document.getElementById('s1_l').innerText = S1;
        document.getElementById('s2_l').innerText = S2;
        totalVol = h1 * S1 + h2 * S2;
    });

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Вода
        ctx.fillStyle = '#3498db'; ctx.globalAlpha = 0.8;
        ctx.fillRect(180 - S1/2, baseY - h1 - 40, S1, h1 + 40);
        ctx.fillRect(450 - S2/2, baseY - h2 - 40, S2, h2 + 40);
        ctx.fillRect(180 - S1/2, baseY - 40, 270 + S2/2, 40);
        ctx.globalAlpha = 1.0;

        // Труби
        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 4;
        ctx.strokeRect(180 - S1/2, 50, S1, baseY - 50);
        ctx.strokeRect(450 - S2/2, 50, S2, baseY - 50);

        const p1Y = baseY - h1 - 50; const p2Y = baseY - h2 - 50;
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(180 - S1/2 - 2, p1Y, S1 + 4, 15);
        ctx.fillRect(450 - S2/2 - 2, p2Y, S2 + 4, 15);

        // Фізика
        let m1 = 0, m2 = 0;
        items.forEach(o => {
            if (o.p === 1) m1 += o.m; if (o.p === 2) m2 += o.m;
            ctx.fillStyle = o.color; ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.fillText(o.label, o.x + o.w/2, o.y + o.h/2 + 5);
        });

        const P1 = (m1 * g / (S1*0.0001)) + (rho * g * h1 * 0.01);
        const P2 = (m2 * g / (S2*0.0001)) + (rho * g * h2 * 0.01);
        document.getElementById('stats').innerText = `P1: ${Math.round(P1)} Па | P2: ${Math.round(P2)} Па`;

        if (P1 > P2 + 10 && h1 > 20) { h1 -= 1; h2 = (totalVol - h1 * S1) / S2; }
        else if (P2 > P1 + 10 && h2 > 20) { h2 -= 1; h1 = (totalVol - h2 * S2) / S1; }

        items.forEach(o => {
            if (!o.drag) {
                if (o.p === 1) { o.x = 180 - o.w/2; o.y = p1Y - o.h; }
                if (o.p === 2) { o.x = 450 - o.w/2; o.y = p2Y - o.h; }
            }
        });

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
